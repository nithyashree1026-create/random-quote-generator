<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Quote Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="particlesCanvas"></canvas>
  <div class="background-overlay"></div>

  <main class="app">
    <div class="top-bar">
      <div>
        <h1 id="appTitle">✨ Random Quote Generator</h1>
        <p id="appSubtitle">Bright quotes for your mood, mindset and motivation</p>
      </div>
      <button id="themeBtn" class="theme-btn">🌙 Dark</button>
    </div>

    <section class="daily-box">
      <h2 id="dailyTitle">🌟 Quote of the Day</h2>
      <p id="dailyQuoteText"></p>
      <span id="dailyQuoteAuthor"></span>
    </section>

    <input type="text" id="searchInput" placeholder="Search quotes... example: study, success, love" />

    <div class="language-box">
      <label id="languageLabel" for="languageSelect">🌐 Language:</label>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="kn">Kannada</option>
        <option value="hi">Hindi</option>
        <option value="ta">Tamil</option>
        <option value="te">Telugu</option>
        <option value="ml">Malayalam</option>
        <option value="mr">Marathi</option>
        <option value="bn">Bengali</option>
        <option value="gu">Gujarati</option>
        <option value="pa">Punjabi</option>
        <option value="ur">Urdu</option>
        <option value="or">Odia</option>
      </select>
    </div>

    <p id="categoryCount"></p>

    <div class="category-box">
      <button class="category active" data-category="all">All</button>
      <button class="category" data-category="motivation">Motivation</button>
      <button class="category" data-category="study">Study</button>
      <button class="category" data-category="life">Life</button>
      <button class="category" data-category="success">Success</button>
      <button class="category" data-category="love">Love</button>
      <button class="category" data-category="confidence">Confidence</button>
      <button class="category" data-category="happiness">Happiness</button>
      <button class="category" data-category="discipline">Discipline</button>
    </div>

    <section class="quote-card" id="quoteCard">
      <img id="quoteImage" alt="Quote image" />

      <div class="quote-content">
        <p id="quoteCounter"></p>
        <p id="quoteText"></p>
        <h3 id="quoteAuthor"></h3>
      </div>
    </section>

    <div class="button-group">
      <button id="newQuoteBtn">New Quote</button>
      <button id="apiQuoteBtn">API Quote</button>
      <button id="copyBtn">Copy</button>
      <button id="tweetBtn">Tweet</button>
      <button id="whatsappBtn">WhatsApp</button>
      <button id="downloadBtn">Download Image</button>
      <button id="speakBtn">Read Aloud</button>
      <button id="moodMusicBtn">Mood Music</button>
      <button id="favoriteBtn">Favorite</button>
    </div>

    <p id="message"></p>

    <section class="favorites-section">
      <h2 id="favoritesTitle">💖 Favorite Quotes</h2>
      <div id="favoritesList"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
